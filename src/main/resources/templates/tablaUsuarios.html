<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy |💈BarberShop💈</title>

  <!-- Bootstrap CSS v5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons v5.3.x -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS Externo -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/footer.css">

  <!-- JS Externo -->
  <script defer src="/javascript/script.js"></script>
  <script defer th:src="@{/javascript/login.js}"></script>

</head>

<body>

  <header>
    <!-- Navegación -->
    <nav th:insert="~{nav.html}"></nav>
  </header>

  <main class="container pt-5 mt-5" style="min-height: 650px;">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>Nombres</th>
          <th>Apellidos</th>
          <th>Correo Electrónico</th>
          <th>Contraseña</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u:${usuarios}">
          <td th:text="${u.nombre}"></td>
          <td th:text="${u.apellido}"></td>
          <td th:text="${u.email}"></td>
          <td th:text="${u.password}"></td>
        </tr>
      </tbody>
    </table>
  </main>

  <!-- Modal - Login -->
  <modal class="modal" id="modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content container-fluid p-5">
      </div>
    </div>
  </modal>

  <footer th:insert="~{footer.html}"></footer>

  <!-- Bootstrap JS v5.3.x -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</body>

</html>
