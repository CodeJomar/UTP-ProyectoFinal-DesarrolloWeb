<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy |💈BarberShop💈</title>

  <!-- Bootstrap CSS v5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons v5.3.x -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS Externo -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="css/ventas.css">
  <link rel="stylesheet" href="/css/footer.css">

  <!-- JS Externo -->
  <script defer src="/javascript/script.js"></script>
  <script defer th:src="@{/javascript/login.js}"></script>

</head>

<body>

  <header>
    <!-- Navegación -->
    <nav th:insert="~{nav.html}"></nav>

  </header>

  <main class="container py-5">
    <div class="container py-5">
      <!-- Barra superior -->
      <div class="row">
        <div class="d-flex justify-content-center justify-content-md-start align-items-center mb-4 col-md-3">
          <h4 class="mb-0">Colección de Productos</h4>
        </div>
        <div class="d-flex justify-content-center justify-content-md-start align-items-center mb-4 col-md-9">
          <div class="d-flex flex-row align-items-center gap-2 w-100">
            <div class="input-group">
              <span class="input-group-text" id="basic-addon1"><i class="bi bi-search"></i></span>
              <input type="text" id="buscarFila" class="form-control buscarFila" placeholder="Buscar Producto"
                aria-label="Buscar Producto" aria-describedby="basic-addon1">
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- Filtros -->
        <div class="col-lg-3">
          <div class="filter-sidebar p-4 shadow-sm">
            <div class="filter-group">
              <h6 class="mb-3">Categorias</h6>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="pr-capilares">
                <label class="form-check-label" for="pr-capilares">
                  Capilares
                </label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="tintes">
                <label class="form-check-label" for="tintes">
                  Tintes
                </label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="accesorios">
                <label class="form-check-label" for="accesorios">
                  Accesorios
                </label>
              </div>
            </div>

            <div class="filter-group">
              <h6 class="mb-3">Rango de Precio</h6>
              <input type="range" class="form-range" min="0" max="1000" value="500">
              <div class="d-flex justify-content-between">
                <span class="text-muted">S/. 0</span>
                <span class="text-muted">S/. 1000</span>
              </div>
            </div>

            <button class="btn btn-outline-primary w-100">Aplicar Filtros</button>
          </div>
        </div>

        <!-- Productos -->
        <div class="col-lg-9">
          <div class="row g-4 d-flex justify-content-center">
            <!-- Carta -->
            <div class="col-md-4 col-sm-6 col-8" th:each="p:${productos}">
              <div class="product-card shadow-sm">
                <div class="position-relative">
                  <img src="/img/picture.webp" class="product-image w-100" alt="Product">
                  <div th:if="${p.descuento != 0}">
                    <span th:class="discount-badge">-<span th:text="${p.descuento}"></span>%</span>
                  </div>
                </div>
                <div class="p-3">
                  <span th:text="${p.categoria}" class="category-badge mb-2 d-inline-block"></span>
                  <h6 th:text="${p.nombre}" class="mb-1"></h6>
                  <div class="rating-stars mb-2">
                    <p class="text-muted"><small>Marca:<span th:text="${p.marca}" class="fst-italic ms-2"></span></small></p>
                  </div>
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="price">S/. <span th:text="${p.precio}"></span></span>
                    <button class="btn btn-outline-primary">
                      <i class="bi bi-cart-plus"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Paginación -->
            <nav aria-label="Page navigation example">
              <ul class="pagination justify-content-center">
                <li class="page-item">
                  <a class="page-link">Previous</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                  <a class="page-link" href="#">Next</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal - Login -->
  <modal class="modal" id="modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content container-fluid p-5">
      </div>
    </div>
  </modal>

  <footer th:insert="~{footer.html}"></footer>

  <!-- Bootstrap JS v5.3.x -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</body>

</html>
