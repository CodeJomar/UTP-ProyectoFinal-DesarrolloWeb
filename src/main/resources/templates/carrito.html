<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy |💈BarberShop💈</title>

  <!-- Bootstrap CSS v5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons v5.3.x -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS Externo -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/carrito.css">


  <!-- JS Externo -->
  <script defer src="/javascript/carrito.js"></script>
  <script defer th:src="@{/javascript/login.js}"></script>

</head>

<body>

  <header>
    <!-- Navegación -->
    <nav th:insert="~{nav.html}"></nav>

  </header>

  <main class="p-5 mt-5">
    <div class="cart-wrapper">
      <div class="container">
        <div class="row g-4">
          <!-- Cart Items Section -->
          <div class="col-lg-8">
            <div class="d-flex justify-content-between mb-2">
              <h4 class="mb-0">Carrito de Compras</h4>
              <nav aria-label="Page navigation">
                <ul class="pagination pagination-floating justify-content-center">
                  <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                      <span aria-hidden="true">«</span>
                    </a>
                  </li>
                  <li class="page-item active"><a class="page-link" href="#">1</a></li>
                  <li class="page-item"><a class="page-link" href="#">2</a></li>
                  <li class="page-item"><a class="page-link" href="#">3</a></li>
                  <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                      <span aria-hidden="true">»</span>
                    </a>
                  </li>
                </ul>
              </nav>
            </div>

            <!-- Product Cards -->
            <div class="d-flex flex-column gap-3">
              <!-- Product 1 -->
              <div class="product-card p-3 shadow-sm">
                <div class="row align-items-center">
                  <div class="col-md-2">
                    <img src="img/picture.webp" alt="Product" class="product-image">
                  </div>
                  <div class="col-md-4">
                    <h6 class="mb-1">Máquinas de cortar cabello</h6>
                    <p class="text-muted mb-0">Babyliss | Pro</p>
                  </div>
                  <div class="col-md-3">
                    <div class="d-flex align-items-center gap-2">
                      <button class="quantity-btn" onclick="updateQuantity(1, -1)">-</button>
                      <input type="number" class="quantity-input" value="1" min="1" disabled>
                      <button class="quantity-btn" onclick="updateQuantity(1, 1)">+</button>
                    </div>
                  </div>
                  <div class="col-md-2">
                    <span class="fw-bold">S/. 129.99</span>
                  </div>
                  <div class="col-md-1">
                    <i class="bi bi-trash remove-btn"></i>
                  </div>
                </div>
              </div>

              <!-- Product 2 -->
              <div class="product-card p-3 shadow-sm">
                <div class="row align-items-center">
                  <div class="col-md-2">
                    <img src="img/picture.webp" alt="Product" class="product-image">
                  </div>
                  <div class="col-md-4">
                    <h6 class="mb-1">Tijeras profesionales</h6>
                    <p class="text-muted mb-0">Samurai</p>
                  </div>
                  <div class="col-md-3">
                    <div class="d-flex align-items-center gap-2">
                      <button class="quantity-btn" onclick="updateQuantity(2, -1)">-</button>
                      <input type="number" class="quantity-input" value="1" min="1" disabled>
                      <button class="quantity-btn" onclick="updateQuantity(2, 1)">+</button>
                    </div>
                  </div>
                  <div class="col-md-2">
                    <span class="fw-bold">S/. 299.99</span>
                  </div>
                  <div class="col-md-1">
                    <i class="bi bi-trash remove-btn"></i>
                  </div>
                </div>
              </div>

              <!-- Product 3 -->
              <div class="product-card p-3 shadow-sm">
                <div class="row align-items-center">
                  <div class="col-md-2">
                    <img src="img/picture.webp" alt="Product" class="product-image">
                  </div>
                  <div class="col-md-4">
                    <h6 class="mb-1">Espumas y geles de afeitar</h6>
                    <p class="text-muted mb-0">Nivea Men</p>
                  </div>
                  <div class="col-md-3">
                    <div class="d-flex align-items-center gap-2">
                      <button class="quantity-btn" onclick="updateQuantity(3, -1)">-</button>
                      <input type="number" class="quantity-input" value="1" min="1" disabled>
                      <button class="quantity-btn" onclick="updateQuantity(3, 1)">+</button>
                    </div>
                  </div>
                  <div class="col-md-2">
                    <span class="fw-bold">S/. 49.99</span>
                  </div>
                  <div class="col-md-1">
                    <i class="bi bi-trash remove-btn"></i>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Summary Section -->
          <div class="col-lg-4">
            <div class="summary-card p-4 shadow-sm">
              <h5 class="mb-4">Resumen del Pedido</h5>

              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Subtotal</span>
                <!-- HACER DINAMICO -->
                <span>$479.97</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Descuento</span>
                <!-- HACER DINAMICO -->
                <span class="text-success">-$26.00</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Envío</span>
                <!-- HACER DINAMICO -->
                <span>$5.00</span>
              </div>
              <hr>
              <div class="d-flex justify-content-between mb-4">
                <span class="fw-bold">Total</span>
                <!-- HACER DINAMICO -->
                <span class="fw-bold">$458.97</span>
              </div>

              <!-- Promo Code -->
              <div class="mb-4">
                <div class="input-group">
                  <input type="text" class="form-control" placeholder="Código de Promoción">
                  <button class="btn btn-outline-secondary" type="button">Aplicar</button>
                </div>
              </div>

              <button class="btn btn-primary checkout-btn w-100 mb-3">
                Proceder al Pago
              </button>

              <div class="d-flex justify-content-center gap-2">
                <i class="bi bi-shield-check text-success"></i>
                <small class="text-muted">Pago Seguro</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal - Login -->
  <section class="modal" id="modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content container-fluid p-5">
      </div>
    </div>
  </section>

  <footer th:insert="~{footer.html}"></footer>

  <!-- Bootstrap JS v5.3.x -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</body>

</html>
