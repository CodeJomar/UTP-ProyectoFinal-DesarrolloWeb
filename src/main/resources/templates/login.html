<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy |💈BarberShop💈</title>

  <!-- Bootstrap CSS v5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons v5.3.x -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS Externo -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/footer.css">

  <!-- JS Externo -->
  <script src="/javascript/script.js"></script>

</head>

<body class="d-flex justify-content-center align-items-center" style="height: 100vh;">
  <main class="py-5 px-5">
    <!-- Section: Design Block -->
    <section class="d-flex justify-content-center">
      <!-- Jumbotron -->
      <div class="px-4 py-5 px-md-5 text-center text-lg-start rounded-2" style="background-color: hsl(0, 0%, 96%)">
        <div class="container">
          <div class="row gx-lg-5 align-items-center">
            <div class="col-lg-5 mb-5 mb-lg-0">
              <h1 class="mb-3 display-3 fw-bold ls-tight">
                Legacy <br />
                <span class="text-primary">Barbers</span>
              </h1>
              <p style="color: hsl(217, 10%, 50.8%)">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Eveniet, itaque accusantium odio, soluta, corrupti Lorem ipsum dolor sit amet consectetur adipisicing
                elit. Soluta
              </p>
              <a href="/index" class="btn btn-outline-primary" role="button">Volver al Inicio</a>
            </div>

            <div class="col-lg-7 mb-5 mb-lg-0">
              <div class="card">
                <div class="card-body py-5 px-md-5">
                  <form method="post" th:action="@{/tablaUsuarios}" th:object="${usuario}">
                    <div class="row">

                      <!-- Nombre Input -->
                      <div class="col-md-6 mb-3">
                        <div class="form-floating">
                          <input th:field="*{nombre}" type="text" class="form-control" id="floatingInput" placeholder="Nombres">
                          <label for="floatingInput">Nombres</label>
                        </div>
                      </div>

                      <!-- Apellido Input -->
                      <div class="col-md-6 mb-3">
                        <div class="form-floating">
                          <input th:field="*{apellido}" type="text" class="form-control" id="floatingInput" placeholder="Apellidos">
                          <label for="floatingInput">Apellidos</label>
                        </div>
                      </div>
                    </div>

                    <!-- Correo input -->
                    <div class="input-group mb-3">
                      <span class="input-group-text">@</span>
                      <div class="form-floating">
                        <input th:field="*{email}" type="email" class="form-control" id="floatingInputGroup1"
                          placeholder="name@example.com">
                        <label for="floatingInputGroup1">Correo Electrónico</label>
                      </div>
                    </div>

                    <!-- Contraseña input -->
                    <div class="input-group mb-3">
                      <span class="input-group-text"><i class="bi bi-key"></i></span>
                      <div class="form-floating">
                        <input th:field="*{password}" type="password" class="form-control" id="floatingInputGroup1" placeholder="Contraseña">
                        <label for="floatingInputGroup1">Contraseña</label>
                      </div>
                    </div>

                    <!-- Boton Submit -->
                    <div class="col-12 text-center">
                      <button type="submit" class="btn btn-primary btn-lg">Registrarse</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Jumbotron -->
    </section>
    <!-- Section: Design Block -->
  </main>
  <!-- Bootstrap JS v5.3.x -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</body>

</html>
